<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Inazuma Legacy – Global Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root { --core-bg: #020812; --neon-orange: #ff6a00; --neon-blue: #00e5ff; --text-main: #e0f2fe; }
        body { background: var(--core-bg); font-family: 'Rajdhani', sans-serif; color: var(--text-main); padding: 40px; height: 100vh; overflow: hidden; }
        .cyber-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.05) 1px, transparent 1px); background-size: 60px 60px; z-index: -1; }

        .container { max-width: 1100px; margin: 0 auto; height: 85vh; display: flex; flex-direction: column; }

        .header-box { border-left: 5px solid var(--neon-orange); padding-left: 25px; margin-bottom: 20px; flex-shrink: 0; }
        .sys-welcome { font-family: 'Bebas Neue'; font-size: 3.5rem; letter-spacing: 5px; }

        /* CONTENEDOR CON SCROLL PARA VER A TODOS LOS JUGADORES */
        .ranking-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-orange) transparent;
        }

        /* Estilo del scroll para navegadores modernos */
        .ranking-scroll::-webkit-scrollbar { width: 4px; }
        .ranking-scroll::-webkit-scrollbar-track { background: rgba(0, 229, 255, 0.05); }
        .ranking-scroll::-webkit-scrollbar-thumb { background: var(--neon-orange); box-shadow: 0 0 10px var(--neon-orange); }

        .rank-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .rank-row { background: rgba(0, 229, 255, 0.03); border: 1px solid rgba(0, 229, 255, 0.1); transition: 0.3s; }
        .rank-row:hover { background: rgba(0, 229, 255, 0.08); transform: scale(1.005); }

        .rank-cell { padding: 15px 20px; font-family: 'Orbitron'; font-size: 0.85rem; border-top: 1px solid rgba(0,229,255,0.1); border-bottom: 1px solid rgba(0,229,255,0.1); }
        .rank-id { font-family: 'Bebas Neue'; font-size: 1.8rem; color: var(--neon-orange); width: 60px; }

        .power-badge {
            background: var(--neon-orange); color: #000; padding: 4px 12px; font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); display: inline-block;
        }

        .btn-back {
            display: inline-block; margin-top: 20px; padding: 12px 35px; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); text-decoration: none; font-family: 'Orbitron'; letter-spacing: 2px;
            transition: 0.4s; flex-shrink: 0; width: fit-content;
        }
        .btn-back:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
    </style>
</head>
<body>
<div class="cyber-grid"></div>
<div class="container">
    <div class="header-box">
        <div style="color:var(--neon-blue); letter-spacing: 8px; font-size: 0.6rem; font-family: 'Orbitron';">DATABASE // FULL_SYNCHRONIZATION</div>
        <h1 class="sys-welcome">GLOBAL <span style="color:var(--neon-orange)">RANKING</span></h1>
    </div>

    <div class="ranking-scroll">
        <table class="rank-table">
            <!-- Iteramos sobre 'ranking', que contiene la lista completa enviada por el controlador -->
            <tr class="rank-row" th:each="j, stat : ${ranking}">
                <!-- Contador de posición en el ranking -->
                <td class="rank-cell rank-id" th:text="${stat.count < 10 ? '0' + stat.count : stat.count}">01</td>

                <td class="rank-cell">
                    <!-- Nombre del jugador en mayúsculas -->
                    <div style="font-size: 1.1rem; color: #fff; line-height: 1;" th:text="${#strings.toUpperCase(j.nombre)}">NOMBRE</div>
                    <!-- Posición y Equipo del modelo Jugador -->
                    <div style="font-size: 0.55rem; color: var(--neon-blue); margin-top: 5px;"
                         th:text="${j.posicion + ' // ' + j.equipo}">POSICIÓN // EQUIPO</div>
                </td>

                <td class="rank-cell text-center">
                    <span style="color:var(--neon-orange); font-size: 0.7rem;">PTS:</span> <br>
                    <!-- Puntos Inazuma del modelo Jugador -->
                    <span th:text="${j.puntosInazuma}">0</span>
                </td>

                <td class="rank-cell text-center">
                    <span style="color:var(--neon-orange); font-size: 0.7rem;">VIC:</span> <br>
                    <!-- Victorias del modelo Jugador -->
                    <span th:text="${j.victorias}">0</span>
                </td>

                <td class="rank-cell text-end">
                    <!-- Invocamos al método getScoreTotal() de tu clase Jugador -->
                    <span class="power-badge" th:text="${#numbers.formatDecimal(j.getScoreTotal(), 1, 0)}">
                        0
                    </span>
                </td>
            </tr>
        </table>
    </div>

    <a href="/pachanga" class="btn-back">TERMINATE_SESSION // BACK</a>
</div>
</body>
</html>
