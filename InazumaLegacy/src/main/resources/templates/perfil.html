<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Inazuma Legacy – Profile HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --core-bg: #020812;
            --neon-orange: #ff6a00;
            --neon-blue: #00e5ff;
            --glass: rgba(10, 25, 47, 0.7);
            --text-main: #e0f2fe;
            --dim: rgba(224, 242, 254, 0.2);
        }

        * { cursor: crosshair; box-sizing: border-box; }

        body {
            background-color: var(--core-bg);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
            overflow-x: hidden;
        }

        /* --- FONDO HUD --- */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, #000 140%); pointer-events: none; z-index: 1; }

        /* --- NAVBAR --- */
        .nav-header {
            position: fixed; top: 20px;
            display: flex; gap: 15px; z-index: 100;
        }
        .nav-btn {
            text-decoration: none; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px 18px; font-family: 'Orbitron'; font-size: 0.7rem;
            transition: 0.3s; background: rgba(0,0,0,0.4);
            letter-spacing: 2px;
        }
        .nav-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .nav-btn.active { border-color: var(--neon-orange); color: var(--neon-orange); box-shadow: 0 0 10px rgba(255, 106, 0, 0.3); }

        /* --- LAYOUT --- */
        .layout {
            display: grid; grid-template-columns: 320px 1fr; gap: 25px;
            width: 95%; max-width: 1100px; margin-top: 60px;
            animation: fadeIn 0.8s ease-out; z-index: 10;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MÓDULO ESTILO HUD --- */
        .module {
            background: var(--glass);
            padding: 1px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            position: relative;
        }
        .module::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-blue));
            z-index: -1;
        }
        .module-inner {
            background: var(--core-bg); height: 100%; padding: 30px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }

        /* --- AVATAR PREVIEW --- */
        .avatar-box {
            width: 130px; height: 130px; border: 1px solid var(--neon-blue); margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 3rem; color: var(--neon-blue);
            background: rgba(0, 229, 255, 0.05);
            clip-path: polygon(20% 0, 100% 0, 100% 80%, 80% 100%, 0 100%, 0 20%);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        /* --- FORMULARIO --- */
        label { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-orange); display: block; margin-top: 20px; letter-spacing: 2px; font-weight: bold; }

        input, textarea {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 12px; color: white; margin-top: 8px; font-family: 'Rajdhani'; outline: none;
            transition: 0.3s; font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--neon-blue); background: rgba(0, 229, 255, 0.05); }

        .btn-sync {
            width: 100%; padding: 18px; background: var(--neon-orange); border: none;
            color: #000; font-family: 'Bebas Neue'; cursor: pointer; margin-top: 30px;
            transition: 0.3s; font-size: 1.5rem; letter-spacing: 2px;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
            font-weight: bold;
        }
        .btn-sync:hover {
            background: #fff; box-shadow: 0 0 25px #fff; transform: translateY(-2px);
        }

        .success-msg {
            color: #00ff88; font-family: 'Orbitron'; text-align: center;
            font-size: 0.7rem; margin-bottom: 20px; text-shadow: 0 0 10px #00ff88;
            background: rgba(0, 255, 136, 0.05); padding: 10px; border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .preview-data { font-size: 0.7rem; color: var(--neon-blue); margin-top: 10px; font-family: 'Orbitron'; letter-spacing: 2px; }

        h1 { font-family: 'Bebas Neue'; color: white; letter-spacing: 3px; font-size: 2.5rem; }

        .deco-line { height: 2px; width: 60px; background: var(--neon-orange); margin-bottom: 20px; }

        @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="vignette"></div>
<div class="cyber-grid"></div>

<nav class="nav-header">
    <a href="/inicio" class="nav-btn">CENTRO_DE_MANDO</a>
    <a href="/ranking" class="nav-btn">RANKING_GLOBAL</a>
    <a href="/perfil" class="nav-btn active">ID_PERFIL</a>
</nav>

<!-- Verificación de usuario -->
<div class="layout" th:if="${user != null}">

    <!-- LADO IZQUIERDO: PREVIEW -->
    <div class="module">
        <div class="module-inner" style="text-align: center;">
            <span class="label" style="margin-top: 0; opacity: 0.5;">IDENTITY_DISP</span>
            <div class="avatar-box">
                <!-- Mostramos la inicial del nombre -->
                <span id="previewChar" th:text="${user.nombre != null && !user.nombre.isEmpty() ? #strings.toUpperCase(#strings.substring(user.nombre,0,1)) : 'U'}">U</span>
            </div>
            <h2 id="previewNombre" style="font-family: 'Bebas Neue'; font-size: 2.2rem; margin-bottom: 5px; color: #fff;" th:text="${user.nombre}">AGENTE</h2>

            <div style="border-top: 1px solid rgba(0, 229, 255, 0.1); margin-top: 15px; padding-top: 15px;">
                <p class="preview-data" id="previewRango" th:text="${user.rango != null ? #strings.toUpperCase(user.rango) : 'SIN_RANGO'}">SIN_RANGO</p>
                <p style="font-size: 0.65rem; color: var(--dim); margin-top: 5px; font-family: 'Orbitron';" id="previewAfiliacion" th:text="${user.afiliacion != null ? #strings.toUpperCase(user.afiliacion) : 'SIN_AFILIACION'}">SIN_AFILIACION</p>
            </div>

            <div style="margin-top: 30px; font-size: 10px; font-family: 'Orbitron'; color: var(--neon-orange); opacity: 0.4;">
                SERIAL_ID: <span th:text="${user.id}">000</span>
            </div>
        </div>
    </div>

    <!-- LADO DERECHO: FORMULARIO -->
    <div class="module" style="flex-grow: 1;">
        <div class="module-inner">
            <h1>MODIFICAR_DATOS</h1>
            <div class="deco-line"></div>

            <!-- Mensaje de éxito -->
            <div th:if="${param.success}" class="success-msg">>> DATABASE_SYNC_COMPLETE // ACCESO_CONFIRMADO</div>

            <form th:action="@{/perfil/actualizar}" method="post">
                <!-- CSRF Token para seguridad (Spring Security) -->
                <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <label>NOMBRE_DE_AGENTE</label>
                <input type="text" id="inNombre" name="nombre" th:value="${user.nombre}" required autocomplete="off">

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label>RANGO_TACTICO</label>
                        <input type="text" id="inRango" name="rango" th:value="${user.rango}" placeholder="Ej: DELANTERO">
                    </div>
                    <div>
                        <label>AFILIACIÓN_SQUAD</label>
                        <input type="text" id="inAfiliacion" name="afiliacion" th:value="${user.afiliacion}" placeholder="Ej: RAIMON FC">
                    </div>
                </div>

                <label>REGISTRO_BIOGRÁFICO</label>
                <textarea name="descripcion" rows="4" th:text="${user.descripcion}" placeholder="Escribe tu historial aquí..."></textarea>

                <button type="submit" class="btn-sync">SINCRONIZAR_NÚCLEO_DATOS</button>
            </form>
        </div>
    </div>
</div>

<!-- Si no hay usuario en sesión -->
<div th:unless="${user != null}" class="module" style="max-width: 450px; margin: 100px auto;">
    <div class="module-inner" style="text-align: center;">
        <p class="success-msg" style="color: #ff2244; background: rgba(255,0,0,0.05); border: 1px solid #ff2244;">>> ACCESS_DENIED // SESIÓN_INVALIDA</p>
        <a href="/login" class="nav-btn" style="display: inline-block; margin-top: 20px;">REINTENTAR_ACCESO</a>
    </div>
</div>

<script>
    // Script para la actualización en tiempo real del HUD (Preview)
    const inNombre = document.getElementById('inNombre');
    const inRango = document.getElementById('inRango');
    const inAfiliacion = document.getElementById('inAfiliacion');

    const preNombre = document.getElementById('previewNombre');
    const preChar = document.getElementById('previewChar');
    const preRango = document.getElementById('previewRango');
    const preAfiliacion = document.getElementById('previewAfiliacion');

    if(inNombre) {
        inNombre.addEventListener('input', () => {
            preNombre.innerText = inNombre.value || "AGENTE";
            preChar.innerText = (inNombre.value.charAt(0) || "U").toUpperCase();
        });
    }

    if(inRango) {
        inRango.addEventListener('input', () => {
            preRango.innerText = (inRango.value || "SIN_RANGO").toUpperCase();
        });
    }

    if(inAfiliacion) {
        inAfiliacion.addEventListener('input', () => {
            preAfiliacion.innerText = (inAfiliacion.value || "SIN_AFILIACION").toUpperCase();
        });
    }
</script>

</body>
</html>
