<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jugadores – Inazuma Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --navy:     #04101e;
            --blue:     #071830;
            --orange:   #ff6a00;
            --orange2:  #ff8c00;
            --electric: #00e5ff;
            --white:    #f0f4ff;
            --gold:     #ffd700;
            --dim:      rgba(240,244,255,.38);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            min-height: 100vh;
            background: var(--navy);
            font-family: 'Rajdhani', sans-serif;
            color: var(--white);
            overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse at 10% 30%, rgba(255,106,0,.12) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 70%, rgba(0,229,255,.07) 0%, transparent 45%),
                linear-gradient(180deg, #04101e 0%, #071830 60%, #04101e 100%);
        }

        .hex-bg {
            position: fixed; inset: 0; z-index: 0; opacity: 0.035;
            background-image:
                repeating-linear-gradient(60deg,  var(--orange) 0, var(--orange) 1px, transparent 0, transparent 50%),
                repeating-linear-gradient(120deg, var(--orange) 0, var(--orange) 1px, transparent 0, transparent 50%),
                repeating-linear-gradient(0deg,   var(--orange) 0, var(--orange) 1px, transparent 0, transparent 50%);
            background-size: 58px 100px;
            animation: hexDrift 30s linear infinite;
        }
        @keyframes hexDrift { 0% { transform: translateY(0); } 100% { transform: translateY(58px); } }

        .scanline {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px);
        }

        /* NAVBAR */
        .navbar {
            position: relative; z-index: 10;
            background: linear-gradient(90deg, var(--navy), var(--blue), var(--navy));
            border-bottom: 1px solid rgba(255,106,0,.25);
            box-shadow: 0 4px 30px rgba(255,106,0,.15);
            padding: 14px 0;
        }
        .navbar::after {
            content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--electric), transparent);
            animation: scanLine 4s linear infinite;
        }
        @keyframes scanLine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .navbar-inner {
            max-width: 1100px; margin: 0 auto; padding: 0 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar-brand {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
            color: var(--orange); letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255,106,0,.4);
        }
        .navbar-back {
            font-family: 'Bebas Neue', sans-serif; font-size: .9rem;
            letter-spacing: 3px; color: var(--orange);
            text-decoration: none; border: 1px solid rgba(255,106,0,.35);
            padding: 7px 18px; border-radius: 3px;
            transition: all .3s; position: relative; overflow: hidden;
        }
        .navbar-back::before { content: ''; position: absolute; inset: 0; background: rgba(255,106,0,.1); opacity: 0; transition: opacity .3s; }
        .navbar-back:hover::before { opacity: 1; }
        .navbar-back:hover { color: var(--gold); border-color: var(--gold); box-shadow: 0 0 16px rgba(255,106,0,.3); }

        /* MAIN */
        .main { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 40px 24px 60px; }

        /* HEADER */
        .page-header { text-align: center; margin-bottom: 40px; animation: riseUp .8s cubic-bezier(.16,1,.3,1) both; }
        @keyframes riseUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .page-title {
            font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem;
            letter-spacing: 6px; color: var(--white);
            text-shadow: 0 0 30px rgba(255,106,0,.4);
        }
        .page-title span {
            color: var(--orange);
            text-shadow: 0 0 20px rgba(255,106,0,.6), 0 0 60px rgba(255,106,0,.2);
        }
        .page-sub { font-size: .75rem; letter-spacing: 5px; color: var(--electric); opacity: .7; margin-top: 6px; }

        .divider-line {
            height: 1px; max-width: 500px; margin: 18px auto 0;
            background: linear-gradient(90deg, transparent, var(--orange), transparent);
        }

        /* CONTROLES */
        .controls {
            display: flex; gap: 14px; flex-wrap: wrap;
            margin-bottom: 24px; align-items: center;
            animation: riseUp .8s cubic-bezier(.16,1,.3,1) .1s both;
        }

        .search-wrap {
            flex: 1; min-width: 220px; position: relative;
        }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,106,0,.45); font-size: .95rem; pointer-events: none; }
        .search-input {
            width: 100%;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,106,0,.22);
            border-radius: 4px; padding: 11px 16px 11px 40px;
            color: var(--white); font-family: 'Rajdhani', sans-serif;
            font-size: .95rem; font-weight: 600; letter-spacing: 1px;
            outline: none; transition: all .3s;
        }
        .search-input::placeholder { color: rgba(240,244,255,.22); font-weight: 400; }
        .search-input:focus { border-color: var(--orange); background: rgba(255,106,0,.04); box-shadow: 0 0 0 3px rgba(255,106,0,.08); }

        .filter-select {
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,106,0,.22);
            border-radius: 4px; padding: 11px 16px;
            color: var(--white); font-family: 'Rajdhani', sans-serif;
            font-size: .95rem; font-weight: 600; letter-spacing: 1px;
            outline: none; transition: all .3s; cursor: pointer;
            min-width: 180px;
        }
        .filter-select option { background: #071830; color: var(--white); }
        .filter-select:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,106,0,.08); }

        /* CONTADOR */
        .counter-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 14px; padding: 10px 16px;
            background: rgba(255,106,0,.05); border: 1px solid rgba(255,106,0,.12);
            border-radius: 4px;
            animation: riseUp .8s cubic-bezier(.16,1,.3,1) .15s both;
        }
        .counter-text { font-size: .75rem; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
        .counter-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--orange); letter-spacing: 3px; }
        .no-results {
            text-align: center; padding: 40px;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
            letter-spacing: 4px; color: rgba(255,106,0,.35);
            display: none;
        }

        /* TABLA */
        .table-wrap {
            border: 1px solid rgba(255,106,0,.18);
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 50px rgba(255,106,0,.08), 0 20px 60px rgba(0,0,0,.4);
            animation: riseUp .8s cubic-bezier(.16,1,.3,1) .2s both;
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr {
            background: linear-gradient(135deg, var(--orange), #cc5500);
        }
        thead th {
            font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
            letter-spacing: 3px; color: #fff;
            padding: 16px 20px; text-align: left;
            cursor: pointer; user-select: none;
            transition: background .2s; position: relative;
        }
        thead th:hover { background: rgba(255,255,255,.1); }
        thead th .sort-icon { margin-left: 6px; opacity: .5; font-size: .8rem; }
        thead th.asc .sort-icon::after  { content: ' ▲'; }
        thead th.desc .sort-icon::after { content: ' ▼'; }
        thead th:not(.asc):not(.desc) .sort-icon::after { content: ' ⇅'; }

        tbody tr {
            border-bottom: 1px solid rgba(255,106,0,.08);
            background: rgba(7,24,48,.6);
            cursor: pointer;
            transition: all .25s ease;
            animation: rowAppear .5s ease both;
        }
        tbody tr:nth-child(even) { background: rgba(10,34,72,.5); }
        tbody tr:hover {
            background: linear-gradient(90deg, rgba(255,106,0,.12), rgba(255,106,0,.05)) !important;
            transform: translateX(6px);
            box-shadow: inset 4px 0 0 var(--orange);
        }
        tbody tr:hover td { color: var(--white); }

        @keyframes rowAppear {
            from { opacity: 0; transform: translateX(-16px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        td {
            padding: 14px 20px; font-size: .95rem;
            font-weight: 600; letter-spacing: .5px;
            color: rgba(240,244,255,.8);
            transition: color .2s;
        }

        /* Badge posición */
        .badge-pos {
            display: inline-block; padding: 3px 10px;
            border-radius: 2px; font-size: .72rem;
            font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
        }
        .badge-pos.portero    { background: rgba(0,229,255,.12); color: var(--electric); border: 1px solid rgba(0,229,255,.3); }
        .badge-pos.defensa    { background: rgba(0,200,100,.12); color: #00cc66;          border: 1px solid rgba(0,200,100,.3); }
        .badge-pos.centrocampista { background: rgba(255,215,0,.12); color: var(--gold);  border: 1px solid rgba(255,215,0,.3); }
        .badge-pos.delantero  { background: rgba(255,106,0,.12); color: var(--orange);    border: 1px solid rgba(255,106,0,.3); }
        .badge-pos.default    { background: rgba(255,255,255,.06); color: var(--dim);     border: 1px solid rgba(255,255,255,.1); }

        /* Flecha de detalle */
        .row-arrow { color: rgba(255,106,0,.3); font-size: .85rem; transition: all .25s; }
        tbody tr:hover .row-arrow { color: var(--orange); transform: translateX(4px); }
    </style>
</head>
<body>

<div class="hex-bg"></div>
<div class="scanline"></div>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar-inner">
        <span class="navbar-brand">⚡ INAZUMA LEGACY</span>
        <a href="/inicio" class="navbar-back">← Volver</a>
    </div>
</nav>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="page-header">
        <div class="page-title">
            TEMPORADA <span th:text="${temporada}">1</span>
        </div>
        <div class="page-sub">PLANTILLA DE JUGADORES · RAIMON FC</div>
        <div class="divider-line"></div>
    </div>

    <!-- CONTROLES -->
    <div class="controls">
        <div class="search-wrap">
            <span class="search-icon">⚲</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar jugador, posición o equipo..."/>
        </div>
        <select class="filter-select" id="filterPos">
            <option value="">Todas las posiciones</option>
            <option value="portero">Portero</option>
            <option value="defensa">Defensa</option>
            <option value="centrocampista">Centrocampista</option>
            <option value="delantero">Delantero</option>
        </select>
    </div>

    <!-- CONTADOR -->
    <div class="counter-bar">
        <span class="counter-text">Jugadores mostrados</span>
        <span class="counter-num" id="counterNum">0</span>
    </div>

    <!-- TABLA -->
    <div class="table-wrap">
        <table id="jugadoresTable">
            <thead>
            <tr>
                <th onclick="sortTable(0)" data-col="0">Nombre <span class="sort-icon"></span></th>
                <th onclick="sortTable(1)" data-col="1">Posición <span class="sort-icon"></span></th>
                <th onclick="sortTable(2)" data-col="2">Equipo <span class="sort-icon"></span></th>
                <th></th>
            </tr>
            </thead>
            <tbody id="jugadoresTbody">
            <tr th:each="j : ${jugadores}"
                th:onclick="|window.location='/jugador/' + ${j.id} + '?temporada=' + ${temporada}|"
                th:data-nombre="${j.nombre}"
                th:data-posicion="${j.posicion}"
                th:data-equipo="${j.equipo}">
                <td th:text="${j.nombre}"></td>
                <td>
                        <span class="badge-pos default" th:text="${j.posicion}"
                              th:classappend="${#strings.containsIgnoreCase(j.posicion,'portero')} ? 'portero' :
                                              (${#strings.containsIgnoreCase(j.posicion,'defensa')} ? 'defensa' :
                                              (${#strings.containsIgnoreCase(j.posicion,'centrocampista')} ? 'centrocampista' :
                                              (${#strings.containsIgnoreCase(j.posicion,'delantero')} ? 'delantero' : 'default')))">
                        </span>
                </td>
                <td th:text="${j.equipo}"></td>
                <td class="row-arrow">▶</td>
            </tr>
            </tbody>
        </table>
        <div class="no-results" id="noResults">⚡ Ningún jugador encontrado</div>
    </div>

</div>

<script>
    const tbody      = document.getElementById('jugadoresTbody');
    const searchInput = document.getElementById('searchInput');
    const filterPos  = document.getElementById('filterPos');
    const counterNum = document.getElementById('counterNum');
    const noResults  = document.getElementById('noResults');
    const allRows    = Array.from(tbody.querySelectorAll('tr'));

    // Animación escalonada de filas
    allRows.forEach((row, i) => {
        row.style.animationDelay = (i * 0.04) + 's';
    });

    function updateCounter() {
        const visible = allRows.filter(r => r.style.display !== 'none').length;
        counterNum.textContent = visible;
        noResults.style.display = visible === 0 ? 'block' : 'none';
    }

    function filterRows() {
        const search = searchInput.value.toLowerCase().trim();
        const pos    = filterPos.value.toLowerCase();

        allRows.forEach(row => {
            const nombre  = (row.dataset.nombre  || '').toLowerCase();
            const posicion = (row.dataset.posicion || '').toLowerCase();
            const equipo  = (row.dataset.equipo  || '').toLowerCase();

            const matchSearch = !search || nombre.includes(search) || posicion.includes(search) || equipo.includes(search);
            const matchPos    = !pos    || posicion.includes(pos);

            row.style.display = matchSearch && matchPos ? '' : 'none';
        });

        updateCounter();
    }

    searchInput.addEventListener('input', filterRows);
    filterPos.addEventListener('change', filterRows);

    // Ordenar columnas
    let sortDir = {};
    function sortTable(colIdx) {
        const ths = document.querySelectorAll('thead th');
        const dir = sortDir[colIdx] === 'asc' ? 'desc' : 'asc';
        sortDir = {};
        sortDir[colIdx] = dir;

        ths.forEach((th, i) => {
            th.classList.remove('asc', 'desc');
            if (i === colIdx) th.classList.add(dir);
        });

        const sorted = allRows.slice().sort((a, b) => {
            const aVal = a.cells[colIdx]?.textContent.trim().toLowerCase() || '';
            const bVal = b.cells[colIdx]?.textContent.trim().toLowerCase() || '';
            return dir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
        });

        sorted.forEach(row => tbody.appendChild(row));
        updateCounter();
    }

    // Inicializar contador
    updateCounter();
</script>
</body>
</html>
