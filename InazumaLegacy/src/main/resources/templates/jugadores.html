<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SQUAD_DATABASE – Inazuma Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --core-bg: #020812;
            --neon-orange: #ff6a00;
            --neon-blue: #00e5ff;
            --glass: rgba(10, 25, 47, 0.7);
            --text-main: #e0f2fe;
            --dim: rgba(224, 242, 254, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            min-height: 100vh; background: var(--core-bg);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main); overflow-x: hidden;
        }

        /* --- FONDO HUD --- */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }

        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, #000 140%); pointer-events: none; z-index: 1; }

        /* --- NAVBAR HUD --- */
        .navbar {
            position: relative; z-index: 100; padding: 20px 40px;
            background: linear-gradient(to bottom, rgba(2,8,18,0.9), transparent);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--dim);
        }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon-blue); letter-spacing: 5px; }

        .nav-links { display: flex; gap: 15px; }

        .back-link {
            font-family: 'Bebas Neue', sans-serif; color: var(--neon-orange);
            text-decoration: none; font-size: 1.1rem; letter-spacing: 2px;
            padding: 5px 20px; border: 1px solid var(--neon-orange); transition: 0.3s;
        }
        .back-link:hover { background: var(--neon-orange); color: #000; box-shadow: 0 0 15px var(--neon-orange); }

        /* --- MAIN CONTENT --- */
        .main { position: relative; z-index: 10; max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* --- HEADER --- */
        .page-header { text-align: left; margin-bottom: 40px; border-left: 4px solid var(--neon-orange); padding-left: 25px; }
        .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 4px; line-height: 1; }
        .page-sub { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--neon-blue); letter-spacing: 6px; margin-top: 10px; opacity: 0.8; }

        /* --- CONTROLES DE BÚSQUEDA --- */
        .controls {
            display: grid; grid-template-columns: 1fr 250px; gap: 20px; margin-bottom: 30px;
            animation: slideIn 0.6s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .search-input, .filter-select {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 15px 20px; color: #fff; font-family: 'Rajdhani'; font-size: 1rem; outline: none;
            transition: 0.3s;
        }
        .search-input:focus, .filter-select:focus { border-color: var(--neon-blue); background: rgba(0, 229, 255, 0.05); box-shadow: 0 0 15px rgba(0, 229, 255, 0.1); }

        /* --- TABLA TÁCTICA --- */
        .table-module {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-blue)); padding: 1px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        .table-inner {
            background: var(--core-bg); width: 100%; overflow: hidden;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        table { width: 100%; border-collapse: collapse; background: rgba(2, 8, 18, 0.5); }

        thead tr { background: rgba(255, 106, 0, 0.1); border-bottom: 1px solid var(--neon-orange); }
        th {
            font-family: 'Orbitron'; font-size: 0.7rem; color: var(--neon-orange);
            text-align: left; padding: 20px; letter-spacing: 2px; text-transform: uppercase;
        }

        tbody tr { border-bottom: 1px solid rgba(0, 229, 255, 0.05); cursor: pointer; transition: 0.3s; }
        tbody tr:hover { background: rgba(0, 229, 255, 0.05); transform: scale(1.002); }

        td { padding: 18px 20px; font-size: 1rem; font-weight: 500; }

        /* --- POSICIONES STYLES --- */
        .badge-pos {
            display: inline-block; padding: 4px 12px; font-family: 'Orbitron'; font-size: 0.6rem;
            border-radius: 2px; text-transform: uppercase; letter-spacing: 1px;
        }
        .portero { background: rgba(0, 229, 255, 0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .defensa { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88; }
        .centrocampista { background: rgba(255, 215, 0, 0.1); color: #ffd700; border: 1px solid #ffd700; }
        .delantero { background: rgba(255, 106, 0, 0.1); color: var(--neon-orange); border: 1px solid var(--neon-orange); }

        /* --- CONTADOR Y STATUS --- */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px; padding: 10px; font-family: 'Orbitron'; font-size: 0.6rem;
            color: var(--dim); letter-spacing: 2px;
        }
        .counter-highlight { color: var(--neon-blue); font-weight: bold; }

        .row-arrow { color: var(--neon-blue); font-size: 0.8rem; text-align: right; opacity: 0.5; }
        tr:hover .row-arrow { opacity: 1; transform: translateX(5px); transition: 0.3s; }

        @media (max-width: 768px) {
            .controls { grid-template-columns: 1fr; }
            th:nth-child(3), td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>

<div class="vignette"></div>
<div class="cyber-grid"></div>

<nav class="navbar">
    <div class="brand">DATABASE_SQUAD // ENCRYPTED_ACCESS</div>
    <div class="nav-links">
        <a th:href="@{/}" class="back-link">← TERMINAL_EXIT</a>
    </div>
</nav>

<div class="main">

    <div class="page-header">
        <h1 class="page-title">SEASON_PHASE_<span th:text="${temporadaActual}">1</span></h1>
        <div class="page-sub">REGISTRO TÁCTICO DE JUGADORES // RAIMON_LEGACY</div>
    </div>

    <div class="controls">
        <input type="text" class="search-input" id="searchInput" placeholder="Filtrar por nombre, equipo o ID..."/>
        <select class="filter-select" id="filterPos">
            <option value="">TODAS_LAS_POSICIONES</option>
            <option value="portero">PORTERO</option>
            <option value="defensa">DEFENSA</option>
            <option value="centrocampista">CENTROCAMPISTA</option>
            <option value="delantero">DELANTERO</option>
        </select>
    </div>

    <div class="table-module">
        <div class="table-inner">
            <table id="jugadoresTable">
                <thead>
                <tr>
                    <th>Agente_Nombre</th>
                    <th>Posición_Campo</th>
                    <th>Afiliación_Equipo</th>
                    <th style="text-align: right;">Access</th>
                </tr>
                </thead>
                <tbody id="jugadoresTbody">
                <tr th:each="j : ${jugadores}"
                    th:onclick="|window.location='/jugador/' + ${j.id} + '?temporada=' + ${temporadaActual}|"
                    th:data-nombre="${j.nombre}"
                    th:data-posicion="${j.posicion}"
                    th:data-equipo="${j.equipo}">
                    <td style="font-weight: 700; color: #fff;" th:text="${j.nombre}"></td>
                    <td>
                        <span class="badge-pos" th:text="${j.posicion}"
                              th:classappend="${#strings.containsIgnoreCase(j.posicion,'portero')} ? 'portero' :
                                              (${#strings.containsIgnoreCase(j.posicion,'defensa')} ? 'defensa' :
                                              (${#strings.containsIgnoreCase(j.posicion,'centrocampista')} ? 'centrocampista' :
                                              (${#strings.containsIgnoreCase(j.posicion,'delantero')} ? 'delantero' : '')))">
                        </span>
                    </td>
                    <td style="color: var(--dim);" th:text="${j.equipo}"></td>
                    <td class="row-arrow">VIEW_FILE ▶</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="status-bar">
        <div>SYSTEM_STATUS: <span style="color: #00ff88;">OPERATIONAL</span></div>
        <div>MATCHING_RECORDS: <span class="counter-highlight" id="counterNum">0</span></div>
    </div>
</div>

<script>
    const tbody = document.getElementById('jugadoresTbody');
    const searchInput = document.getElementById('searchInput');
    const filterPos = document.getElementById('filterPos');
    const counterNum = document.getElementById('counterNum');
    const allRows = Array.from(tbody.querySelectorAll('tr'));

    function updateCounter() {
        const visible = allRows.filter(r => r.style.display !== 'none').length;
        counterNum.textContent = visible;
    }

    function filterRows() {
        const search = searchInput.value.toLowerCase().trim();
        const pos = filterPos.value.toLowerCase();

        allRows.forEach(row => {
            const nombre = (row.dataset.nombre || '').toLowerCase();
            const posicion = (row.dataset.posicion || '').toLowerCase();
            const equipo = (row.dataset.equipo || '').toLowerCase();

            const matchSearch = !search || nombre.includes(search) || equipo.includes(search);
            const matchPos = !pos || posicion.includes(pos);

            row.style.display = matchSearch && matchPos ? '' : 'none';
        });

        updateCounter();
    }

    searchInput.addEventListener('input', filterRows);
    filterPos.addEventListener('change', filterRows);

    updateCounter();
</script>
</body>
</html>
