<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Jugadores - Inazuma Legacy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/estilos.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <h1 class="fw-bold mb-4 text-warning text-center">
        Jugadores - Temporada <span th:text="${temporada}"></span>
    </h1>

    <div class="table-responsive">
        <table class="table table-dark table-striped table-hover table-bordered text-center">
            <thead class="table-warning text-dark">
            <tr>
                <th>Nombre</th>
                <th>Posición</th>
                <th>Equipo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="j : ${jugadores}">
                <td th:text="${j.nombre}"></td>
                <td th:text="${j.posicion}"></td>
                <td th:text="${j.equipo}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="text-center mt-3">
        <a href="/inicio" class="btn btn-outline-warning">← Volver</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
