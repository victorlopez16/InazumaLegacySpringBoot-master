<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${jugador.nombre} + ' – Tactical File'">Jugador – Inazuma Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --core-bg: #020812;
            --neon-orange: #ff6a00;
            --neon-blue: #00e5ff;
            --glass: rgba(10, 25, 47, 0.75);
            --text-main: #e0f2fe;
            --dim: rgba(224, 242, 254, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            min-height: 100vh; background: var(--core-bg);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main); overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        /* --- FONDO HUD --- */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }

        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, #000 140%); pointer-events: none; z-index: 1; }

        /* --- NAVBAR HUD --- */
        .navbar {
            position: relative; z-index: 100;
            padding: 20px 40px;
            background: linear-gradient(to bottom, rgba(2,8,18,0.9), transparent);
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--neon-blue); letter-spacing: 4px; }
        .back-link {
            font-family: 'Bebas Neue', sans-serif; color: var(--neon-orange);
            text-decoration: none; font-size: 1.2rem; letter-spacing: 2px;
            padding: 5px 15px; border: 1px solid var(--neon-orange);
            transition: 0.3s;
        }
        .back-link:hover { background: var(--neon-orange); color: #000; box-shadow: 0 0 15px var(--neon-orange); }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-container {
            position: relative; z-index: 10;
            max-width: 1100px; margin: 40px auto;
            width: 90%; display: grid;
            grid-template-columns: 350px 1fr; gap: 30px;
            animation: dossierIn 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes dossierIn { from { opacity: 0; transform: scale(0.95) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        @media (max-width: 850px) { .main-container { grid-template-columns: 1fr; } }

        /* --- MÓDULOS --- */
        .module {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-blue));
            padding: 1px;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }

        .module-inner {
            background: var(--core-bg);
            height: 100%; width: 100%; padding: 30px;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            position: relative;
        }

        /* --- AVATAR CARD --- */
        .player-photo-wrap {
            width: 100%; aspect-ratio: 1; margin-bottom: 20px;
            border: 1px solid var(--neon-blue);
            background: rgba(0, 229, 255, 0.05);
            clip-path: polygon(15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%, 0 15%);
            overflow: hidden; position: relative;
        }
        .player-photo { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.3) contrast(1.1); }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 3s linear infinite; z-index: 2;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .id-label { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-orange); letter-spacing: 2px; margin-bottom: 5px; display: block;}
        .player-name { font-family: 'Bebas Neue'; font-size: 2.5rem; color: #fff; line-height: 1; margin-bottom: 10px; }

        .section-title {
            font-family: 'Orbitron'; font-size: 0.75rem; color: var(--neon-blue);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 3px;
        }

        .data-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .data-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
        .data-value { font-weight: 700; color: #fff; letter-spacing: 1px; }

        .badge-pos {
            padding: 4px 12px; font-family: 'Orbitron'; font-size: 0.65rem;
            border-radius: 2px; text-transform: uppercase;
        }
        .portero { background: rgba(0, 229, 255, 0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .defensa { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88; }
        .centrocampista { background: rgba(255, 215, 0, 0.1); color: #ffd700; border: 1px solid #ffd700; }
        .delantero { background: rgba(255, 106, 0, 0.1); color: var(--neon-orange); border: 1px solid var(--neon-orange); }

        .trajectory-text {
            font-size: 1rem; line-height: 1.8; color: var(--text-main); opacity: 0.8;
            font-weight: 300; text-align: justify;
        }

        .deco-id {
            position: absolute; bottom: 20px; right: 30px;
            font-family: 'Bebas Neue'; font-size: 5rem;
            color: rgba(255, 106, 0, 0.05); line-height: 0.8; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="vignette"></div>
<div class="cyber-grid"></div>

<nav class="navbar">
    <div class="brand">FILE_ACCESS // TACTICAL_DASHBOARD</div>
    <a th:href="@{/jugadores(temporada=${temporada})}" class="back-link">← RETURN_TO_SQUAD</a>
</nav>

<div class="main-container">

    <div class="col">
        <div class="module">
            <div class="module-inner">
                <span class="id-label">PLAYER_IDENTIFICATION</span>
                <div class="player-photo-wrap">
                    <div class="scan-line"></div>
                    <img th:src="@{'/images/jugadores/' + ${jugador.fotoUrl}}" alt="Foto Jugador">
                </div>

                <h1 class="player-name" th:text="${jugador.nombre}">NOMBRE JUGADOR</h1>

                <div style="margin-top: 20px;">
                    <span class="id-label">CURRENT_ASSIGNMENT</span>
                    <div style="font-family:'Bebas Neue'; font-size: 1.5rem; color: var(--neon-blue);" th:text="${jugador.equipo}">EQUIPO</div>
                </div>

                <div class="deco-id" th:text="${jugador.id}">00</div>
            </div>
        </div>
    </div>

    <div class="col" style="display: flex; flex-direction: column; gap: 30px;">

        <div class="module">
            <div class="module-inner">
                <h3 class="section-title">NEURAL_STATISTICS</h3>

                <div class="data-row">
                    <span class="data-label">Posición en Campo</span>
                    <span class="data-value">
                        <span class="badge-pos" th:text="${jugador.posicion}"
                              th:classappend="${#strings.containsIgnoreCase(jugador.posicion,'portero')} ? 'portero' :
                                              (${#strings.containsIgnoreCase(jugador.posicion,'defensa')} ? 'defensa' :
                                              (${#strings.containsIgnoreCase(jugador.posicion,'centrocampista')} ? 'centrocampista' :
                                              (${#strings.containsIgnoreCase(jugador.posicion,'delantero')} ? 'delantero' : '')))">
                        </span>
                    </span>
                </div>

                <div class="data-row">
                    <span class="data-label">Protocolo de Temporada</span>
                    <span class="data-value" style="color: var(--neon-orange);">PHASE_<span th:text="${temporada}">1</span></span>
                </div>

                <div class="data-row">
                    <span class="data-label">ID de Registro</span>
                    <span class="data-value" th:text="'#IDX-' + ${jugador.id}">—</span>
                </div>

                <div class="data-row">
                    <span class="data-label">Estado de Conexión</span>
                    <span class="data-value" style="color: #00ff88;">SYNC_COMPLETE</span>
                </div>
            </div>
        </div>

        <div class="module">
            <div class="module-inner">
                <h3 class="section-title">HISTORICAL_LOGS</h3>
                <p class="trajectory-text" th:text="${jugador.descripcion}">
                    Cargando registros tácticos...
                </p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
