<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AUTH_CHECK – Inazuma Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --core-bg: #020812;
            --neon-orange: #ff6a00;
            --neon-blue: #00e5ff;
            --glass: rgba(10, 25, 47, 0.7);
            --text-main: #e0f2fe;
            --dim: rgba(224, 242, 254, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh; background: var(--core-bg);
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: var(--text-main);
        }

        /* --- FONDO HUD --- */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }

        .scanline {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,.15) 3px, rgba(0,0,0,.15) 4px);
        }

        .deco-symbol {
            position: fixed; left: -2%; top: -5%; font-family: 'Bebas Neue';
            font-size: 20rem; color: rgba(0, 229, 255, 0.03); user-select: none; z-index: 0;
        }

        /* --- CONTENEDOR --- */
        .wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 440px; padding: 20px;
            animation: bootUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes bootUp {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .brand { text-align: center; margin-bottom: 25px; }
        .brand-name { font-family: 'Bebas Neue'; font-size: 2.2rem; letter-spacing: 4px; }
        .brand-tag { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-blue); letter-spacing: 4px; opacity: 0.7; }

        /* --- TARJETA --- */
        .card {
            background: var(--glass);
            padding: 1px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        .card-inner {
            background: var(--core-bg);
            padding: 40px 30px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            border: 1px solid rgba(0, 229, 255, 0.15);
        }

        /* --- STEP INDICATOR --- */
        .step-indicator { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .step { width: 30px; height: 30px; border: 1px solid var(--dim); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 0.7rem; color: var(--dim); }
        .step.active { border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        .step.done { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); }
        .step-line { flex: 0.2; height: 1px; background: var(--dim); }

        .card-title { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-orange); text-align: center; margin-bottom: 10px; letter-spacing: 2px; }
        .email-badge { color: var(--neon-blue); font-weight: bold; background: rgba(0, 229, 255, 0.05); padding: 2px 8px; border: 1px solid rgba(0, 229, 255, 0.1); }

        /* --- INPUTS DE CÓDIGO --- */
        .code-inputs { display: flex; gap: 8px; justify-content: center; margin: 25px 0; }
        .code-inputs input {
            width: 45px; height: 55px; text-align: center; font-family: 'Bebas Neue';
            font-size: 1.8rem; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 229, 255, 0.2); color: #fff; outline: none;
            transition: 0.3s;
        }
        .code-inputs input:focus {
            border-color: var(--neon-blue); background: rgba(0, 229, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1); transform: translateY(-2px);
        }

        .btn-submit {
            width: 100%; padding: 16px; background: var(--neon-blue);
            border: none; color: #000; font-family: 'Bebas Neue';
            font-size: 1.4rem; letter-spacing: 3px; cursor: pointer;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
            transition: 0.3s; font-weight: bold;
        }
        .btn-submit:hover { background: #fff; box-shadow: 0 0 25px #fff; transform: translateY(-2px); }

        .error {
            background: rgba(255, 68, 68, 0.1); color: #ff4444; border-left: 3px solid #ff4444;
            padding: 12px; font-size: 0.75rem; font-family: 'Orbitron'; margin-bottom: 20px;
        }

        .foot { text-align: center; margin-top: 25px; font-size: 0.8rem; color: var(--dim); }
        .foot a { color: var(--neon-orange); text-decoration: none; font-weight: bold; }
        .foot a:hover { text-shadow: 0 0 10px var(--neon-orange); }

    </style>
</head>
<body>

<div class="cyber-grid"></div>
<div class="scanline"></div>
<div class="deco-symbol">CODE</div>

<div class="wrap">
    <div class="brand">
        <h1 class="brand-name">INAZUMA LEGACY</h1>
        <p class="brand-tag">SECURITY_VERIFICATION_PROTOCOL</p>
    </div>

    <div class="card">
        <div class="card-inner">
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step-line"></div>
                <div class="step active">02</div>
                <div class="step-line"></div>
                <div class="step">03</div>
            </div>

            <h2 class="card-title">VERIFICAR_IDENTIDAD</h2>
            <p style="text-align: center; font-size: 0.8rem; opacity: 0.6; line-height: 1.5;">
                Código de 6 dígitos enviado a:<br/>
                <span class="email-badge" th:text="${email}">agente@raimon.jp</span>
            </p>

            <div th:if="${error}" class="error">>> AUTH_FAILED: CÓDIGO_INVÁLIDO</div>

            <form action="/verificar-codigo" method="post" id="codeForm">
                <input type="hidden" name="email" th:value="${email}"/>
                <input type="hidden" name="codigo" id="codigoHidden"/>

                <div class="code-inputs">
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" placeholder="-"/>
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" placeholder="-"/>
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" placeholder="-"/>
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" placeholder="-"/>
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" placeholder="-"/>
                    <input type="text" maxlength="1" class="digit" inputmode="numeric" placeholder="-"/>
                </div>

                <button type="submit" class="btn-submit">CONFIRMAR_ACCESO</button>
            </form>

            <div class="foot">
                ¿No has recibido el código? <br/>
                <a href="/recuperar-password">REENVIAR_PROTOCOLO</a>
            </div>
        </div>
    </div>
</div>

<script>
    const digits = document.querySelectorAll('.digit');
    digits.forEach((input, i) => {
        input.addEventListener('input', () => {
            input.value = input.value.replace(/\D/g, '');
            if (input.value && i < digits.length - 1) digits[i + 1].focus();
        });
        input.addEventListener('keydown', e => {
            if (e.key === 'Backspace' && !input.value && i > 0) digits[i - 1].focus();
        });
    });

    document.getElementById('codeForm').addEventListener('submit', () => {
        document.getElementById('codigoHidden').value = [...digits].map(d => d.value).join('');
    });
</script>

</body>
</html>
