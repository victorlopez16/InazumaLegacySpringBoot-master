<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – Inazuma Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --navy:     #04101e;
            --blue:     #071830;
            --blue2:    #0a2248;
            --orange:   #ff6a00;
            --orange2:  #ff8c00;
            --electric: #00e5ff;
            --white:    #f0f4ff;
            --gold:     #ffd700;
            --dim:      rgba(240,244,255,.38);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            min-height: 100vh;
            background: var(--navy);
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* FONDO */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse at 15% 60%, rgba(255,106,0,.16) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 10%, rgba(0,229,255,.07) 0%, transparent 45%),
                radial-gradient(ellipse at 55% 90%, rgba(255,140,0,.09) 0%, transparent 40%),
                linear-gradient(180deg, #04101e 0%, #071830 60%, #04101e 100%);
        }

        /* Grid hexagonal */
        .hex-bg {
            position: fixed; inset: 0; z-index: 0; opacity: 0.045;
            background-image:
                repeating-linear-gradient(60deg,  var(--orange) 0, var(--orange) 1px, transparent 0, transparent 50%),
                repeating-linear-gradient(120deg, var(--orange) 0, var(--orange) 1px, transparent 0, transparent 50%),
                repeating-linear-gradient(0deg,   var(--orange) 0, var(--orange) 1px, transparent 0, transparent 50%);
            background-size: 58px 100px;
            animation: hexDrift 30s linear infinite;
        }
        @keyframes hexDrift { 0% { transform: translateY(0); } 100% { transform: translateY(58px); } }

        /* Scanlines */
        .scanline {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,.07) 3px, rgba(0,0,0,.07) 4px);
        }

        /* Rayos de energía */
        .energy { position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
        .energy span {
            position: absolute; width: 1.5px;
            background: linear-gradient(to bottom, transparent, var(--orange), transparent);
            animation: bolt linear infinite; opacity: 0;
        }
        .energy span:nth-child(1)  { left:  5%; height: 160px; animation-duration: 3.4s; animation-delay: 0.0s; }
        .energy span:nth-child(2)  { left: 18%; height: 220px; animation-duration: 5.2s; animation-delay: 1.3s; }
        .energy span:nth-child(3)  { left: 35%; height: 140px; animation-duration: 4.1s; animation-delay: 0.6s; }
        .energy span:nth-child(4)  { left: 52%; height: 200px; animation-duration: 3.8s; animation-delay: 2.0s; }
        .energy span:nth-child(5)  { left: 68%; height: 180px; animation-duration: 4.6s; animation-delay: 0.9s; }
        .energy span:nth-child(6)  { left: 82%; height: 240px; animation-duration: 5.0s; animation-delay: 1.7s; }
        .energy span:nth-child(7)  { left: 94%; height: 170px; animation-duration: 3.6s; animation-delay: 2.5s; }
        .energy span:nth-child(8)  { left: 11%; height: 130px; animation-duration: 4.3s; animation-delay: 1.1s; background: linear-gradient(to bottom, transparent, var(--electric), transparent); }
        .energy span:nth-child(9)  { left: 60%; height: 190px; animation-duration: 5.5s; animation-delay: 3.0s; background: linear-gradient(to bottom, transparent, var(--electric), transparent); }
        @keyframes bolt {
            0%   { top: -20%; opacity: 0; }
            12%  { opacity: .8; }
            88%  { opacity: .2; }
            100% { top: 120%; opacity: 0; }
        }

        /* Partículas */
        .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: .4; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Números decorativos */
        .deco-number  { position: fixed; right: -40px; bottom: -60px; font-family: 'Bebas Neue', sans-serif; font-size: 400px; line-height: 1; color: rgba(255,106,0,.032); user-select: none; z-index: 1; letter-spacing: -20px; }
        .deco-number2 { position: fixed; left: -60px; top: -40px; font-family: 'Bebas Neue', sans-serif; font-size: 300px; line-height: 1; color: rgba(0,229,255,.025); user-select: none; z-index: 1; }

        /* WRAP */
        .wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 460px; padding: 20px;
            animation: riseUp .9s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes riseUp {
            from { opacity: 0; transform: translateY(44px) scale(.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ESCUDO */
        .brand { text-align: center; margin-bottom: 28px; }
        .shield-wrap {
            display: inline-block;
            animation: shieldFloat 4s ease-in-out infinite, glowPulse 3s ease-in-out infinite;
        }
        @keyframes shieldFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes glowPulse {
            0%,100% { filter: drop-shadow(0 0 14px rgba(255,106,0,.4)) drop-shadow(0 0 40px rgba(255,106,0,.15)); }
            50%      { filter: drop-shadow(0 0 28px rgba(255,106,0,.7)) drop-shadow(0 0 70px rgba(255,106,0,.3)); }
        }
        .shield-wrap svg { width: 96px; height: 96px; }

        .brand-name {
            font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
            letter-spacing: 6px; color: var(--white);
            animation: textGlow 3s ease-in-out infinite alternate;
            line-height: 1; margin-top: 12px;
        }
        @keyframes textGlow {
            from { text-shadow: 0 0 20px rgba(255,106,0,.4), 0 0 40px rgba(255,106,0,.15); }
            to   { text-shadow: 0 0 35px rgba(255,106,0,.7), 0 0 70px rgba(255,106,0,.3); }
        }
        .brand-tag { font-size: .78rem; letter-spacing: 7px; color: var(--electric); font-weight: 700; margin-top: 6px; opacity: .85; }

        /* CARD */
        .card {
            background: linear-gradient(155deg, rgba(10,34,72,.95) 0%, rgba(7,24,48,.98) 50%, rgba(4,16,30,.97) 100%);
            border: 1px solid rgba(255,106,0,.22);
            border-radius: 6px; padding: 40px 42px 36px;
            position: relative; backdrop-filter: blur(24px);
            box-shadow: 0 0 0 1px rgba(255,106,0,.06), 0 2px 0 rgba(255,106,0,.15), 0 28px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05);
            overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--orange), rgba(255,215,0,.6), var(--orange), transparent);
            animation: borderSweep 4s ease-in-out infinite;
        }
        @keyframes borderSweep { 0%,100% { opacity: .6; } 50% { opacity: 1; box-shadow: 0 0 12px var(--orange); } }

        /* Esquinas */
        .corner { position: absolute; width: 20px; height: 20px; border-color: var(--orange); border-style: solid; }
        .corner.tl { top: -1px; left: -1px;    border-width: 2px 0 0 2px; }
        .corner.tr { top: -1px; right: -1px;   border-width: 2px 2px 0 0; }
        .corner.bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }
        .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        .card-title {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 4px; color: var(--orange);
            text-align: center; margin-bottom: 26px;
        }
        .card-title::before, .card-title::after { content: '──'; font-size: .75rem; opacity: .5; margin: 0 10px; vertical-align: middle; }

        /* CAMPOS */
        .field { margin-bottom: 18px; position: relative; }
        .field label {
            display: flex; align-items: center; gap: 6px;
            font-size: .68rem; letter-spacing: 3px;
            color: var(--orange); text-transform: uppercase;
            font-weight: 700; margin-bottom: 8px; opacity: .85;
        }
        .field input {
            width: 100%;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,106,0,.18);
            border-bottom-color: rgba(255,106,0,.35);
            border-radius: 3px; padding: 13px 16px 13px 42px;
            color: var(--white); font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; font-weight: 600; letter-spacing: 1px;
            outline: none; transition: all .35s;
        }
        .field input::placeholder { color: rgba(240,244,255,.2); font-weight: 400; }
        .field input:focus {
            border-color: var(--orange);
            background: rgba(255,106,0,.05);
            box-shadow: 0 0 0 3px rgba(255,106,0,.08), 0 4px 20px rgba(255,106,0,.12);
            transform: translateY(-1px);
        }
        .field-icon { position: absolute; left: 14px; bottom: 14px; color: rgba(255,106,0,.45); font-size: 1rem; pointer-events: none; transition: color .3s; }
        .field:focus-within .field-icon { color: var(--orange); }
        .field::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            height: 2px; width: 0;
            background: linear-gradient(90deg, var(--orange), var(--gold));
            border-radius: 0 0 3px 3px; transition: width .4s cubic-bezier(.4,0,.2,1);
        }
        .field:focus-within::after { width: 100%; }

        /* BOTÓN */
        .btn-submit {
            width: 100%; margin-top: 8px; padding: 15px;
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange2) 60%, #ffaa00 100%);
            border: none; border-radius: 3px; color: #fff;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem;
            letter-spacing: 5px;
            position: relative; overflow: hidden;
            transition: all .3s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 4px 20px rgba(255,106,0,.3), inset 0 1px 0 rgba(255,255,255,.15);
        }
        .btn-submit::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 100%); opacity: 0; transition: opacity .3s; }
        .btn-submit::after  { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent); transition: left .6s; }
        .btn-submit:hover::before { opacity: 1; }
        .btn-submit:hover::after  { left: 140%; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 35px rgba(255,106,0,.5), 0 0 0 1px rgba(255,106,0,.3); }
        .btn-submit:active { transform: translateY(-1px); }
        .btn-submit span { position: relative; z-index: 1; }

        /* ERROR */
        .error {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,50,50,.08); border: 1px solid rgba(255,80,80,.25);
            border-left: 3px solid #ff4444;
            border-radius: 3px; padding: 12px 15px; color: #ff7070;
            font-size: .82rem; letter-spacing: 1px; margin-bottom: 20px;
            animation: shake .4s ease;
        }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

        /* DIVISOR */
        .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0 18px; color: rgba(240,244,255,.18); font-size: .72rem; letter-spacing: 3px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,106,0,.2), transparent); }

        /* FOOT */
        .foot { text-align: center; font-size: .88rem; color: var(--dim); letter-spacing: .5px; }
        .foot a { color: var(--orange); text-decoration: none; font-weight: 700; letter-spacing: 1px; position: relative; transition: color .3s; }
        .foot a::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 100%; height: 1px; background: var(--gold); transition: right .3s; }
        .foot a:hover { color: var(--gold); }
        .foot a:hover::after { right: 0; }

        /* STATS */
        .stats-bar { display: flex; justify-content: center; gap: 28px; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,106,0,.1); }
        .stat { text-align: center; animation: fadeIn 1s ease both; }
        .stat:nth-child(1) { animation-delay: .3s; }
        .stat:nth-child(2) { animation-delay: .5s; }
        .stat:nth-child(3) { animation-delay: .7s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--orange); letter-spacing: 2px; line-height: 1; }
        .stat-label { font-size: .6rem; letter-spacing: 2.5px; color: var(--dim); text-transform: uppercase; margin-top: 3px; }
        .stat-sep { width: 1px; background: rgba(255,106,0,.15); align-self: stretch; margin: 4px 0; }
    </style>
</head>
<body>

<div class="hex-bg"></div>
<div class="scanline"></div>
<div class="energy">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>
<div class="particles" id="particles"></div>
<div class="deco-number">1</div>
<div class="deco-number2">∞</div>

<div class="wrap">

    <!-- Marca -->
    <div class="brand">
        <div class="shield-wrap">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%"   stop-color="#0e2a60"/>
                        <stop offset="100%" stop-color="#04101e"/>
                    </linearGradient>
                    <linearGradient id="rayoG" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%"   stop-color="#ffd700"/>
                        <stop offset="100%" stop-color="#ff6a00"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <path d="M50 4 L92 20 L92 56 Q92 82 50 97 Q8 82 8 56 L8 20 Z" fill="url(#sg)" stroke="#ff6a00" stroke-width="2"/>
                <path d="M50 14 L82 27 L82 54 Q82 75 50 88 Q18 75 18 54 L18 27 Z" fill="none" stroke="rgba(255,106,0,.22)" stroke-width="1"/>
                <polygon points="55,22 43,50 52,50 45,78 60,46 51,46 57,22" fill="url(#rayoG)" filter="url(#glow)" opacity=".95"/>
                <circle cx="28" cy="40" r="2" fill="rgba(255,215,0,.4)"/>
                <circle cx="72" cy="40" r="2" fill="rgba(255,215,0,.4)"/>
            </svg>
        </div>
        <div class="brand-name">INAZUMA LEGACY</div>
        <div class="brand-tag">⚡ Raimon FC — Since 2024 ⚡</div>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="card-title">Acceso al Equipo</div>

        <div th:if="${param.error}" class="error">
            ⚠ &nbsp;Credenciales incorrectas. Inténtalo de nuevo.
        </div>

        <form action="/login" method="post">
            <div class="field">
                <label>Jugador</label>
                <span class="field-icon">◈</span>
                <input type="text" name="username" placeholder="Nombre de usuario" required autocomplete="off"/>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <span class="field-icon">⬡</span>
                <input type="password" name="password" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn-submit">
                <span>⚡ Entrar al Campo</span>
            </button>
        </form>

        <div class="divider">Inazuma Legacy</div>

        <div class="foot">
            ¿Primera vez en el equipo? <a href="/registro">Únete aquí</a>
        </div>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-num">3</div>
                <div class="stat-label">Temporadas</div>
            </div>
            <div class="stat-sep"></div>
            <div class="stat">
                <div class="stat-num">∞</div>
                <div class="stat-label">Jugadores</div>
            </div>
            <div class="stat-sep"></div>
            <div class="stat">
                <div class="stat-num">1</div>
                <div class="stat-label">Equipo</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Partículas flotantes
    const pc = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1;
        const isBlue = Math.random() > .65;
        p.style.cssText = `
            left: ${Math.random()*100}%;
            width: ${size}px; height: ${size}px;
            background: ${isBlue ? 'var(--electric)' : 'var(--orange)'};
            opacity: ${Math.random()*.5+.1};
            animation-duration: ${Math.random()*12+8}s;
            animation-delay: ${Math.random()*10}s;
            box-shadow: 0 0 ${size*3}px ${isBlue ? 'var(--electric)' : 'var(--orange)'};
        `;
        pc.appendChild(p);
    }
</script>
</body>
</html>
