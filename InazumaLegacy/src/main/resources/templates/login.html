<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inazuma Legacy – Neural Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --core-bg: #020812;
            --neon-orange: #ff6a00;
            --neon-blue: #00e5ff;
            --glass: rgba(10, 25, 47, 0.75);
            --text-main: #e0f2fe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            height: 100vh; background: var(--core-bg);
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: var(--text-main);
        }

        /* --- FONDO TECH-DEEP --- */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(255,106,0,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,106,0,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px; transform: rotateX(45deg);
            z-index: -1; animation: gridMove 10s linear infinite;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 50px; } }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            pointer-events: none; z-index: 1;
        }

        /* --- MARCO DE INTERFAZ --- */
        .hud-frame {
            position: fixed; inset: 20px;
            border: 1px solid rgba(255,106,0,0.1);
            pointer-events: none; z-index: 2;
        }
        .hud-corner {
            position: absolute; width: 40px; height: 40px;
            border: 2px solid var(--neon-orange);
        }
        .c-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .c-br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .login-module {
            position: relative; z-index: 10;
            width: 420px; padding: 2px;
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-blue));
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            animation: moduleIn 1.2s cubic-bezier(0.19, 1, 0.22, 1) both;
        }
        @keyframes moduleIn {
            from { opacity: 0; transform: translateY(100px) skewX(-10deg); }
            to { opacity: 1; transform: translateY(0) skewX(0); }
        }

        .inner-card {
            background: var(--core-bg);
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            padding: 40px; position: relative;
        }

        /* --- TEXTOS --- */
        .header { text-align: left; margin-bottom: 30px; border-left: 4px solid var(--neon-orange); padding-left: 15px; }
        .sys-title { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: #fff; }
        .sys-status { font-size: 0.7rem; color: var(--neon-blue); letter-spacing: 4px; font-weight: bold; }

        /* --- CAMPOS DE ENTRADA --- */
        .input-wrap { margin-bottom: 25px; position: relative; }
        .input-label {
            font-size: 0.6rem; color: var(--neon-orange);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 8px; display: block;
        }

        .cyber-input {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,229,255,0.2);
            padding: 15px 15px 15px 45px; color: #fff;
            font-family: 'Rajdhani', sans-serif; font-size: 1.1rem;
            transition: 0.4s;
        }
        .cyber-input:focus {
            outline: none; background: rgba(0,229,255,0.08);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0,229,255,0.2);
        }

        .input-icon {
            position: absolute; left: 15px; bottom: 15px;
            color: var(--neon-blue); opacity: 0.5;
        }

        /* --- BOTÓN DE ACCESO --- */
        .access-btn {
            width: 100%; padding: 20px;
            background: transparent; border: 1px solid var(--neon-orange);
            color: var(--neon-orange); font-family: 'Orbitron', sans-serif;
            font-weight: bold; font-size: 1rem; letter-spacing: 5px;
            position: relative; overflow: hidden; transition: 0.4s;
        }
        .access-btn:hover {
            background: var(--neon-orange); color: #000;
            box-shadow: 0 0 30px rgba(255,106,0,0.4);
        }
        .access-btn::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); transition: 0.5s;
        }
        .access-btn:hover::before { left: 100%; }

        /* --- DECORACIONES --- */
        .latency-meter {
            position: absolute; bottom: 15px; right: 20px;
            font-size: 0.6rem; color: rgba(255,255,255,0.2);
        }
        .glitch-bar {
            height: 2px; width: 50px; background: var(--neon-orange);
            margin-top: 10px; animation: glitch 2s steps(2) infinite;
        }
        @keyframes glitch { 0% { width: 10px; } 50% { width: 60px; opacity: 0.5; } 100% { width: 20px; } }

        .footer-links {
            margin-top: 25px; display: flex; justify-content: space-between;
            font-size: 0.75rem; color: var(--dim);
        }
        .footer-links a { color: var(--neon-blue); text-decoration: none; transition: 0.3s; }
        .footer-links a:hover { text-shadow: 0 0 10px var(--neon-blue); }

    </style>
</head>
<body>

<div class="vignette"></div>
<div class="cyber-grid"></div>

<div class="hud-frame">
    <div class="hud-corner c-tl"></div>
    <div class="hud-corner c-br"></div>
</div>

<div class="login-module">
    <div class="inner-card">

        <div class="header">
            <div class="sys-status">IDENTITY_CHECK // V.4.0</div>
            <div class="sys-title">INAZUMA_LEGACY</div>
            <div class="glitch-bar"></div>
        </div>

        <div th:if="${param.error}" style="color: #ff4444; font-size: 0.75rem; margin-bottom: 15px; border-left: 2px solid #ff4444; padding-left: 10px;">
            ACCESS_DENIED: Credenciales no válidas.
        </div>

        <form action="/login" method="post">
            <div class="input-wrap">
                <label class="input-label">Identificador del Jugador</label>
                <span class="input-icon">▶</span>
                <input type="text" name="username" class="cyber-input" placeholder="ID_USER" required autocomplete="off"/>
            </div>

            <div class="input-wrap">
                <label class="input-label">Clave de Encriptación</label>
                <span class="input-icon">#</span>
                <input type="password" name="password" class="cyber-input" placeholder="********" required/>
            </div>

            <button type="submit" class="access-btn">
                INICIAR_SESION
            </button>
        </form>

        <div class="footer-links">
            <span>¿Sin credenciales? <a href="/registro">Registrar</a></span>
            <a href="/recuperar-password">Reset_Pass</a>
        </div>

        <div class="latency-meter">
            SECURE_CONNECTION: 24ms<br>
            ENC: AES_256_LOCAL
        </div>
    </div>
</div>

<script>
    document.querySelector('.access-btn').addEventListener('click', () => {
        // Aquí podrías añadir un sonido de confirmación tech
        console.log("Verificando identidad...");
    });
</script>
</body>
</html>
