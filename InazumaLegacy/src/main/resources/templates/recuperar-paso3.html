<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FINAL_OVERWRITE – Inazuma Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --core-bg: #020812;
            --neon-orange: #ff6a00;
            --neon-blue: #00e5ff;
            --neon-green: #00ff88;
            --glass: rgba(10, 25, 47, 0.7);
            --text-main: #e0f2fe;
            --dim: rgba(224, 242, 254, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh; background: var(--core-bg);
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: var(--text-main);
        }

        /* --- FONDO --- */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }

        .scanline {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,.15) 3px, rgba(0,0,0,.15) 4px);
        }

        /* --- CONTENEDOR --- */
        .wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 440px; padding: 20px;
            animation: bootUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes bootUp {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .brand { text-align: center; margin-bottom: 25px; }
        .brand-name { font-family: 'Bebas Neue'; font-size: 2.2rem; letter-spacing: 4px; }
        .brand-tag { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-blue); letter-spacing: 4px; opacity: 0.7; }

        /* --- TARJETA --- */
        .card {
            background: var(--glass);
            padding: 1px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        .card-inner {
            background: var(--core-bg);
            padding: 40px 30px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            border: 1px solid rgba(0, 255, 136, 0.15); /* Verde indicando paso final */
        }

        .step-indicator { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .step { width: 30px; height: 30px; border: 1px solid var(--dim); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 0.7rem; color: var(--dim); }
        .step.active { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        .step.done { background: var(--neon-green); color: #000; border-color: var(--neon-green); }
        .step-line { flex: 0.2; height: 1px; background: var(--dim); }

        .card-title { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-green); text-align: center; margin-bottom: 10px; letter-spacing: 2px; }

        /* --- CAMPOS --- */
        .field { margin-bottom: 22px; position: relative; }
        .field label {
            display: block; font-family: 'Orbitron'; font-size: 0.6rem;
            color: var(--neon-orange); margin-bottom: 8px; letter-spacing: 2px;
        }
        .field input {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255, 106, 0, 0.2);
            padding: 14px 45px 14px 15px; color: #fff;
            font-family: 'Rajdhani'; font-size: 1rem; outline: none;
            transition: 0.3s;
        }
        .field input:focus { border-color: var(--neon-orange); background: rgba(255, 106, 0, 0.05); }

        /* --- STRENGTH METER --- */
        .strength-container { margin-top: 8px; }
        .strength-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .strength-text { font-family: 'Orbitron'; font-size: 0.55rem; margin-top: 5px; text-align: right; text-transform: uppercase; }

        .toggle-pwd {
            position: absolute; right: 15px; bottom: 14px;
            background: none; border: none; cursor: pointer; color: var(--dim);
            font-size: 1.1rem; transition: 0.3s;
        }
        .toggle-pwd:hover { color: var(--neon-blue); }

        .btn-submit {
            width: 100%; padding: 16px; background: var(--neon-green);
            border: none; color: #000; font-family: 'Bebas Neue';
            font-size: 1.4rem; letter-spacing: 3px; cursor: pointer;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
            transition: 0.3s; font-weight: bold; margin-top: 10px;
        }
        .btn-submit:hover { background: #fff; box-shadow: 0 0 25px var(--neon-green); transform: translateY(-2px); }

        .error {
            background: rgba(255, 68, 68, 0.1); color: #ff4444; border-left: 3px solid #ff4444;
            padding: 12px; font-size: 0.75rem; font-family: 'Orbitron'; margin-bottom: 20px;
        }

        .foot { text-align: center; margin-top: 25px; font-size: 0.8rem; color: var(--dim); }
        .foot a { color: var(--neon-blue); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="cyber-grid"></div>
<div class="scanline"></div>

<div class="wrap">
    <div class="brand">
        <h1 class="brand-name">INAZUMA LEGACY</h1>
        <p class="brand-tag">CREDENTIAL_REWRITE_MODULE</p>
    </div>

    <div class="card">
        <div class="card-inner">
            <div class="step-indicator">
                <div class="step done">✓</div>
                <div class="step-line"></div>
                <div class="step done">✓</div>
                <div class="step-line"></div>
                <div class="step active">03</div>
            </div>

            <h2 class="card-title">NUEVA_CONTRASEÑA</h2>

            <div th:if="${error}" class="error">>> CORE_ERROR: <span th:text="${error}">Error en el proceso.</span></div>

            <form action="/nueva-password" method="post">
                <input type="hidden" name="email" th:value="${email}"/>
                <input type="hidden" name="token" th:value="${token}"/>

                <div class="field">
                    <label>NEW_SECURITY_KEY</label>
                    <input type="password" name="password" id="pwd1" placeholder="Mínimo 6 caracteres" required oninput="updateStrength(this.value)"/>
                    <button type="button" class="toggle-pwd" onclick="toggle('pwd1')">👁</button>

                    <div class="strength-container">
                        <div class="strength-bar"><div class="strength-fill" id="bar"></div></div>
                        <div class="strength-text" id="status">SEGURIDAD: ESPERANDO...</div>
                    </div>
                </div>

                <div class="field">
                    <label>CONFIRM_KEY</label>
                    <input type="password" name="password2" id="pwd2" placeholder="Repite la clave" required/>
                    <button type="button" class="toggle-pwd" onclick="toggle('pwd2')">👁</button>
                </div>

                <button type="submit" class="btn-submit">ACTUALIZAR_SISTEMA</button>
            </form>

            <div class="foot">
                ¿Recordaste tu clave? <br/>
                <a href="/login">RETORNAR_AL_ACCESO</a>
            </div>
        </div>
    </div>
</div>

<script>
    function toggle(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    function updateStrength(val) {
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        let score = 0;

        if (val.length >= 6) score += 20;
        if (val.length >= 10) score += 20;
        if (/[A-Z]/.test(val)) score += 20;
        if (/\d/.test(val)) score += 20;
        if (/[^A-Za-z0-9]/.test(val)) score += 20;

        bar.style.width = score + '%';

        if (score < 40) {
            bar.style.background = '#ff4444';
            status.innerText = 'SEGURIDAD: INSUFICIENTE';
            status.style.color = '#ff4444';
        } else if (score < 80) {
            bar.style.background = '#ff8c00';
            status.innerText = 'SEGURIDAD: ESTABLE';
            status.style.color = '#ff8c00';
        } else {
            bar.style.background = '#00ff88';
            status.innerText = 'SEGURIDAD: IMPENETRABLE';
            status.style.color = '#00ff88';
            bar.style.boxShadow = '0 0 10px #00ff88';
        }
    }
</script>

</body>
</html>
