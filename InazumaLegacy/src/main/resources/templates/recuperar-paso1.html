<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RESTORE_ACCESS – Inazuma Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --core-bg: #020812;
            --neon-orange: #ff6a00;
            --neon-blue: #00e5ff;
            --glass: rgba(10, 25, 47, 0.7);
            --text-main: #e0f2fe;
            --dim: rgba(224, 242, 254, 0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh; background: var(--core-bg);
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: var(--text-main);
        }

        /* --- FONDO ANIMADO --- */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }

        .scanline {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,.15) 3px, rgba(0,0,0,.15) 4px);
        }

        .deco-symbol {
            position: fixed; right: -2%; bottom: -5%; font-family: 'Bebas Neue';
            font-size: 25rem; color: rgba(255, 106, 0, 0.03); user-select: none; z-index: 0;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .wrap {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; padding: 20px;
            animation: bootUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes bootUp {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .brand { text-align: center; margin-bottom: 30px; }
        .shield-icon {
            font-size: 3.5rem; color: var(--neon-orange);
            filter: drop-shadow(0 0 15px rgba(255, 106, 0, 0.4));
            margin-bottom: 10px; display: block;
        }
        .brand-name {
            font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem;
            letter-spacing: 5px; line-height: 1;
        }
        .brand-tag {
            font-family: 'Orbitron'; font-size: 0.6rem; color: var(--neon-blue);
            letter-spacing: 4px; margin-top: 8px; opacity: 0.7;
        }

        /* --- TARJETA --- */
        .card {
            background: var(--glass);
            padding: 1px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        .card-inner {
            background: var(--core-bg);
            padding: 40px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            border: 1px solid rgba(255, 106, 0, 0.15);
        }

        .card-title {
            font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-orange);
            text-align: center; margin-bottom: 10px; letter-spacing: 2px;
        }
        .card-desc {
            text-align: center; font-size: 0.85rem; color: rgba(224, 242, 254, 0.6);
            margin-bottom: 30px; line-height: 1.6;
        }

        /* --- FORMULARIO --- */
        .field { margin-bottom: 20px; position: relative; }
        .field label {
            display: block; font-family: 'Orbitron'; font-size: 0.6rem;
            color: var(--neon-orange); margin-bottom: 8px; letter-spacing: 2px;
        }
        .field input {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 14px 15px 14px 45px; color: #fff;
            font-family: 'Rajdhani'; font-size: 1rem; outline: none;
            transition: 0.3s;
        }
        .field input:focus {
            border-color: var(--neon-blue); background: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .field-icon {
            position: absolute; left: 15px; bottom: 14px;
            color: var(--neon-blue); opacity: 0.5;
        }

        .btn-submit {
            width: 100%; padding: 16px; background: var(--neon-orange);
            border: none; color: #000; font-family: 'Bebas Neue';
            font-size: 1.4rem; letter-spacing: 3px; cursor: pointer;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
            transition: 0.3s; font-weight: bold;
        }
        .btn-submit:hover {
            background: #fff; box-shadow: 0 0 25px #fff; transform: translateY(-2px);
        }

        /* --- NOTIFICACIONES --- */
        .msg {
            padding: 12px; font-size: 0.75rem; font-family: 'Orbitron';
            margin-bottom: 20px; border-left: 3px solid;
        }
        .error { background: rgba(255, 68, 68, 0.1); color: #ff4444; border-color: #ff4444; }
        .success { background: rgba(0, 255, 136, 0.1); color: #00ff88; border-color: #00ff88; }

        .footer-link {
            text-align: center; margin-top: 25px; font-size: 0.85rem;
        }
        .footer-link a {
            color: var(--neon-blue); text-decoration: none; font-weight: bold;
            transition: 0.3s; border-bottom: 1px solid transparent;
        }
        .footer-link a:hover { border-color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

    </style>
</head>
<body>

<div class="cyber-grid"></div>
<div class="scanline"></div>
<div class="deco-symbol">?</div>

<div class="wrap">
    <div class="brand">
        <span class="shield-icon">⚡</span>
        <h1 class="brand-name">INAZUMA LEGACY</h1>
        <p class="brand-tag">IDENTITY_RECOVERY_SYSTEM</p>
    </div>

    <div class="card">
        <div class="card-inner">
            <h2 class="card-title">RESTABLECER_ACCESO</h2>
            <p class="card-desc">Introduce tu dirección de correo encriptada para recibir el protocolo de restauración.</p>

            <div th:if="${error}" class="msg error">
                [!] ERROR_RECORDS: <span th:text="${error}">Email no registrado.</span>
            </div>
            <div th:if="${exito}" class="msg success">
                [✓] SYSTEM_MSG: <span th:text="${exito}">Enlace de restauración enviado.</span>
            </div>

            <form action="/recuperar-password" method="post">
                <div class="field">
                    <label>USER_EMAIL_ADDRESS</label>
                    <span class="field-icon">✉</span>
                    <input type="email" name="email" placeholder="agente@raimon.jp" required autocomplete="off"/>
                </div>

                <button type="submit" class="btn-submit">INICIAR_RECUPERACIÓN</button>
            </form>

            <div class="footer-link">
                <a href="/login">← VOLVER AL ACCESO_CORE</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
