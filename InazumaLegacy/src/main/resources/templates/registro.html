<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inazuma Legacy – Neural Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --core-bg: #020812;
            --neon-orange: #ff6a00;
            --neon-blue: #00e5ff;
            --glass: rgba(10, 25, 47, 0.75);
            --text-main: #e0f2fe;
            --ok: #00ff88;
            --err: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            min-height: 100vh; background: var(--core-bg);
            font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden; color: var(--text-main);
            padding: 20px;
        }

        /* --- FONDO TECH-DEEP (Igual que Login) --- */
        .cyber-grid {
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(255,106,0,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,106,0,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px; transform: rotateX(45deg);
            z-index: -1; animation: gridMove 10s linear infinite;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 50px; } }

        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            pointer-events: none; z-index: 1;
        }

        /* --- MARCO DE INTERFAZ --- */
        .hud-frame {
            position: fixed; inset: 20px;
            border: 1px solid rgba(255,106,0,0.1);
            pointer-events: none; z-index: 2;
        }
        .hud-corner {
            position: absolute; width: 40px; height: 40px;
            border: 2px solid var(--neon-orange);
        }
        .c-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .c-br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        /* --- MÓDULO DE REGISTRO --- */
        .login-module {
            position: relative; z-index: 10;
            width: 100%; max-width: 480px; padding: 2px;
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-blue));
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            animation: moduleIn 1.2s cubic-bezier(0.19, 1, 0.22, 1) both;
        }
        @keyframes moduleIn {
            from { opacity: 0; transform: translateY(100px) skewX(-10deg); }
            to { opacity: 1; transform: translateY(0) skewX(0); }
        }

        .inner-card {
            background: var(--core-bg);
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            padding: 40px; position: relative;
        }

        .header { text-align: left; margin-bottom: 25px; border-left: 4px solid var(--neon-orange); padding-left: 15px; }
        .sys-title { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: #fff; }
        .sys-status { font-size: 0.7rem; color: var(--neon-blue); letter-spacing: 4px; font-weight: bold; }

        /* --- CAMPOS DE ENTRADA --- */
        .input-wrap { margin-bottom: 18px; position: relative; }
        .input-label {
            display: flex; justify-content: space-between;
            font-size: 0.6rem; color: var(--neon-orange);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .cyber-input {
            width: 100%; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,229,255,0.2);
            padding: 12px 15px 12px 45px; color: #fff;
            font-family: 'Rajdhani', sans-serif; font-size: 1rem;
            transition: 0.4s;
        }
        .cyber-input:focus {
            outline: none; background: rgba(0,229,255,0.08);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0,229,255,0.15);
        }

        .input-icon {
            position: absolute; left: 15px; bottom: 12px;
            color: var(--neon-blue); opacity: 0.5;
        }

        /* --- LOGICA VISUAL DE VALIDACIÓN --- */
        .status-text { font-size: 0.6rem; letter-spacing: 1px; }
        .ok { color: var(--ok); }
        .err { color: var(--err); }

        .strength-meter {
            height: 2px; width: 100%; background: rgba(255,255,255,0.05);
            margin-top: 8px; position: relative;
        }
        #strengthBar {
            height: 100%; width: 0%; background: var(--err);
            transition: 0.5s ease; box-shadow: 0 0 10px currentcolor;
        }

        /* --- BOTÓN DE ACCESO --- */
        .access-btn {
            width: 100%; padding: 18px; margin-top: 10px;
            background: transparent; border: 1px solid var(--neon-orange);
            color: var(--neon-orange); font-family: 'Orbitron', sans-serif;
            font-weight: bold; font-size: 0.9rem; letter-spacing: 4px;
            position: relative; overflow: hidden; transition: 0.4s;
            cursor: pointer;
        }
        .access-btn:hover:not(:disabled) {
            background: var(--neon-orange); color: #000;
            box-shadow: 0 0 30px rgba(255,106,0,0.4);
        }
        .access-btn:disabled {
            opacity: 0.3; border-color: #555; color: #555; cursor: not-allowed;
        }

        .footer-links {
            margin-top: 25px; display: flex; justify-content: center;
            font-size: 0.75rem; color: rgba(255,255,255,0.4);
        }
        .footer-links a { color: var(--neon-blue); text-decoration: none; margin-left: 8px; transition: 0.3s; }
        .footer-links a:hover { text-shadow: 0 0 10px var(--neon-blue); }

        .glitch-bar {
            height: 2px; width: 50px; background: var(--neon-orange);
            margin-top: 10px; animation: glitch 2s steps(2) infinite;
        }
        @keyframes glitch { 0% { width: 10px; } 50% { width: 60px; opacity: 0.5; } 100% { width: 20px; } }

        .latency-meter {
            position: absolute; bottom: 15px; right: 20px;
            font-size: 0.55rem; color: rgba(255,255,255,0.15); text-align: right;
        }
    </style>
</head>
<body>

<div class="vignette"></div>
<div class="cyber-grid"></div>

<div class="hud-frame">
    <div class="hud-corner c-tl"></div>
    <div class="hud-corner c-br"></div>
</div>

<div class="login-module">
    <div class="inner-card">

        <div class="header">
            <div class="sys-status">NEW_PLAYER_PROTOCOL // V.4.0</div>
            <div class="sys-title">REGISTRO_SISTEMA</div>
            <div class="glitch-bar"></div>
        </div>

        <form th:action="@{/registro}" method="post" id="regForm">
            <div class="input-wrap">
                <label class="input-label">
                    Alias de Jugador
                    <span id="nameStatus" class="status-text"></span>
                </label>
                <span class="input-icon">◈</span>
                <input type="text" name="nombre" id="nombre" class="cyber-input" placeholder="USERNAME" required autocomplete="off"/>
            </div>

            <div class="input-wrap">
                <label class="input-label">
                    Enlace de Red (Email)
                    <span id="emailStatus" class="status-text"></span>
                </label>
                <span class="input-icon">@</span>
                <input type="email" name="email" id="email" class="cyber-input" placeholder="MAIL_ADDRESS" required autocomplete="off"/>
            </div>

            <div class="input-wrap">
                <label class="input-label">
                    Clave de Acceso
                    <span id="pwdStatus" class="status-text"></span>
                </label>
                <span class="input-icon">#</span>
                <input type="password" name="password" id="pwd" class="cyber-input" placeholder="********" required/>
                <div class="strength-meter">
                    <div id="strengthBar"></div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="access-btn" disabled>
                CREAR_IDENTIDAD
            </button>
        </form>

        <div class="footer-links">
            <span>¿Identidad existente? <a href="/login">Acceder</a></span>
        </div>

        <div class="latency-meter">
            UPLINK_STATUS: OPTIMAL<br>
            SIGNAL: 128-BIT_ENCRYPTED
        </div>
    </div>
</div>

<script>
    const formState = { name: false, email: false, pwd: false };
    const submitBtn = document.getElementById('submitBtn');

    // Validación de Nombre
    document.getElementById('nombre').addEventListener('input', (e) => {
        const val = e.target.value;
        const status = document.getElementById('nameStatus');
        if(val.length >= 3) {
            status.textContent = "✔"; status.className = "status-text ok";
            formState.name = true;
        } else {
            status.textContent = "SHORT_ID"; status.className = "status-text err";
            formState.name = false;
        }
        updateButton();
    });

    // Validación de Email
    document.getElementById('email').addEventListener('input', (e) => {
        const val = e.target.value;
        const status = document.getElementById('emailStatus');
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(re.test(val)) {
            status.textContent = "VALID_LINK"; status.className = "status-text ok";
            formState.email = true;
        } else {
            status.textContent = "INVALID_LINK"; status.className = "status-text err";
            formState.email = false;
        }
        updateButton();
    });

    // Validación de Password + Barra de fuerza
    document.getElementById('pwd').addEventListener('input', (e) => {
        const val = e.target.value;
        const status = document.getElementById('pwdStatus');
        const bar = document.getElementById('strengthBar');

        let strength = 0;
        if(val.length >= 6) strength += 40;
        if(/[A-Z]/.test(val)) strength += 30;
        if(/[0-9]/.test(val)) strength += 30;

        bar.style.width = strength + "%";

        if(strength < 40) {
            bar.style.backgroundColor = "var(--err)";
            status.textContent = "WEAK"; status.className = "status-text err";
            formState.pwd = false;
        } else if (strength < 100) {
            bar.style.backgroundColor = "var(--neon-orange)";
            status.textContent = "MEDIUM"; status.className = "status-text";
            formState.pwd = true;
        } else {
            bar.style.backgroundColor = "var(--ok)";
            status.textContent = "SECURE"; status.className = "status-text ok";
            formState.pwd = true;
        }
        updateButton();
    });

    function updateButton() {
        submitBtn.disabled = !(formState.name && formState.email && formState.pwd);
    }
</script>
</body>
</html>
