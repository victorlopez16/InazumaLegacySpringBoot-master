<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro - Inazuma Legacy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/estilos.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex justify-content-center align-items-center vh-100">

<div class="card bg-secondary text-white p-4 shadow" style="width: 360px;">
    <h1 class="text-center fw-bold mb-4">Crear cuenta</h1>

    <form th:action="@{/registro}" method="post">
        <div class="mb-3">
            <input type="text" name="nombre" placeholder="Usuario"
                   class="form-control bg-dark text-white border-warning" required/>
        </div>
        <div class="mb-3">
            <input type="email" name="email" placeholder="Email"
                   class="form-control bg-dark text-white border-warning" required/>
        </div>
        <div class="mb-3">
            <input type="password" name="password" placeholder="Contraseña"
                   class="form-control bg-dark text-white border-warning" required/>
        </div>
        <div class="d-grid">
            <button type="submit" class="btn btn-warning fw-bold">Registrarse</button>
        </div>
    </form>

    <p class="text-center mt-3 mb-0">
        <a href="/login" class="text-warning">¿Ya tienes cuenta? Inicia sesión</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
