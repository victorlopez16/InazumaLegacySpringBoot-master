<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <meta charset="UTF-8"/>
    <title>Chat Core – Inazuma Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --navy: #04101e; --orange: #ff6a00; --electric: #00e5ff;
            --white: #f0f4ff; --dim: rgba(240,244,255,.38);
            --glass: rgba(10, 34, 72, 0.85); --gold: #ffd700;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh; background: var(--navy); font-family: 'Rajdhani', sans-serif;
            display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--white);
        }
        .hex-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.04; background-image: repeating-linear-gradient(60deg, var(--orange) 0, var(--orange) 1px, transparent 0, transparent 50%); background-size: 50px 80px; }

        .chat-container { width: 95%; max-width: 1100px; height: 85vh; display: flex; background: var(--glass); border: 1px solid rgba(255,106,0,.2); border-radius: 8px; backdrop-filter: blur(20px); position: relative; overflow: hidden; }

        .chat-sidebar { width: 260px; background: rgba(4, 16, 30, 0.6); border-right: 1px solid rgba(255,106,0,.15); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,106,0,.1); font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--orange); }

        .tab-item, .user-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; color: var(--dim); border-left: 3px solid transparent; text-transform: uppercase; font-weight: 600; font-size: 0.85rem; }
        .tab-item.active, .user-item.active { background: rgba(255,106,0,0.1); border-left-color: var(--orange); color: var(--orange); }
        .ia-tab.active { border-left-color: var(--electric); color: var(--electric); background: rgba(0,229,255,.1); }

        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid rgba(255,106,0,0.1); background: rgba(0,0,0,0.2); }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: none; flex-direction: column; gap: 15px; }
        .chat-box.active { display: flex; }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .msg-wrapper.out { align-self: flex-end; }
        .msg-wrapper.in  { align-self: flex-start; }
        .msg { padding: 12px 16px; border-radius: 4px; font-size: 0.95rem; }
        .msg-wrapper.in .msg { background: rgba(255,255,255,0.05); border-left: 3px solid var(--electric); }
        .msg-wrapper.out .msg { background: rgba(255,106,0,0.1); border-right: 3px solid var(--orange); text-align: right; }
        .msg-ia { border-left: 3px solid var(--gold) !important; background: rgba(255,215,0,0.05) !important; }
        .msg-info { font-size: 0.65rem; color: var(--orange); margin-bottom: 4px; }

        .chat-input-area { padding: 20px; display: flex; gap: 10px; background: rgba(4,16,30,0.8); }
        .input-wrapper { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,106,0,0.3); border-radius: 4px; padding: 5px 15px; }
        .input-wrapper input { width: 100%; background: transparent; border: none; color: white; padding: 10px; outline: none; font-family: 'Rajdhani'; }
        .btn-send { background: var(--orange); color: black; border: none; padding: 0 20px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 1.2rem; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 999; }
    </style>
</head>
<body>
<div class="hex-bg"></div>
<div id="toast-container"></div>

<div class="chat-container">
    <div class="chat-sidebar">
        <div class="sidebar-header">COMMS_CENTER</div>
        <div class="chat-tabs">
            <div class="tab-item active" onclick="switchTab('global', 'GLOBAL', this)"><span>⚡</span> GLOBAL</div>
            <div class="tab-item ia-tab" onclick="switchTab('ia', 'IA', this)"><span>🤖</span> INAZUMA IA</div>
            <div style="padding: 15px 25px; font-size: 0.7rem; color: var(--orange); opacity: 0.6;">CONTACTS</div>
            <div th:each="u : ${usuarios}" th:if="${u.nombre != nombreUsuario}" class="user-item" th:onclick="switchTab('privado', [[${u.nombre}]], this)">
                <span th:text="${u.nombre}">Usuario</span>
            </div>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header"><h2 id="chat-title">CANAL GLOBAL</h2></div>

        <div class="chat-box active" id="box-global">
            <div th:each="m : ${historialGlobal}" th:class="'msg-wrapper ' + (${m.remitente == nombreUsuario} ? 'out' : 'in')">
                <div th:class="'msg' + (${m.remitente == 'GEMINI_IA'} ? ' msg-ia' : '')">
                    <div class="msg-info" th:text="${m.remitente}">REMITENTE</div>
                    <div th:text="${m.contenido}">Contenido</div>
                </div>
            </div>
        </div>
        <div class="chat-box" id="box-ia"></div>
        <div class="chat-box" id="box-privado"></div>

        <div class="chat-input-area">
            <div class="input-wrapper"><input type="text" id="user-input" placeholder="Transmitir..." autocomplete="off"></div>
            <button class="btn-send" onclick="sendMessage()">ENVIAR</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const nombreUsuario = [[${nombreUsuario}]];
    let stompClient = null;
    let tabUI = 'global';
    let destinatarioActual = 'GLOBAL';

    window.onload = function() {
        const socket = new SockJS('/ws-inazuma');
        stompClient = Stomp.over(socket);
        stompClient.debug = function(str) {
            console.log("STOMP_LOG: " + str);
        };

        stompClient.connect({}, function() {
            // Canal Global
            stompClient.subscribe('/topic/public', (msg) => mostrarMensaje(JSON.parse(msg.body), 'global'));

            // NUEVA Suscripción Dinámica para IA y Privados (Bypassing UserPrincipal)
            stompClient.subscribe('/queue/mensajes-' + nombreUsuario, (msg) => {
                const datos = JSON.parse(msg.body);
                // Si el mensaje es de la IA, va a la caja IA. Si no, a Privado.
                if (datos.remitente === 'GEMINI_IA') {
                    mostrarMensaje(datos, 'ia');
                } else {
                    mostrarMensaje(datos, 'privado');
                }
            });
        });
    };

    function switchTab(ui, dest, el) {
        tabUI = ui;
        destinatarioActual = dest;
        document.getElementById('chat-title').innerText = ui === 'ia' ? 'INAZUMA IA' : (ui === 'global' ? 'CANAL GLOBAL' : 'PRIVADO: ' + dest);
        document.querySelectorAll('.tab-item, .user-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.chat-box').forEach(b => b.classList.remove('active'));
        const box = document.getElementById('box-' + ui);
        box.classList.add('active');
        box.scrollTop = box.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        if (input.value.trim() && stompClient) {
            stompClient.send("/app/chat.send", {}, JSON.stringify({
                remitente: nombreUsuario,
                destinatario: destinatarioActual,
                contenido: input.value,
                tipo: 'TEXTO'
            }));
            input.value = '';
        }
    }

    function mostrarMensaje(msg, canalSugerido) {
        let targetId = 'box-global';

        // Lógica de enrutamiento basada en el contenido del mensaje
        if (msg.destinatario === 'GLOBAL') {
            targetId = 'box-global';
        } else if (msg.remitente === 'GEMINI_IA' || msg.destinatario === 'IA') {
            targetId = 'box-ia';
        } else {
            targetId = 'box-privado';
        }

        const box = document.getElementById(targetId);
        const esPropio = msg.remitente === nombreUsuario;
        const esIA = msg.remitente === 'GEMINI_IA';

        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${esPropio ? 'out' : 'in'}`;
        wrapper.innerHTML = `
            <div class="msg ${esIA ? 'msg-ia' : ''}">
                <div class="msg-info">${esIA ? '⚡ AI_SYSTEM' : msg.remitente}</div>
                <div>${msg.contenido}</div>
            </div>
        `;
        box.appendChild(wrapper);
        box.scrollTop = box.scrollHeight;

        // Feedback visual si recibimos algo en una pestaña que no tenemos abierta
        if (tabUI !== targetId.replace('box-','') && !esPropio) {
            showToast("NUEVO MENSAJE EN " + targetId.replace('box-','').toUpperCase());
        }
    }

    function showToast(txt) {
        const t = document.createElement('div');
        t.style = "background: var(--orange); color: black; padding: 10px; margin-top: 5px; font-weight: bold;";
        t.innerText = txt;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    document.getElementById('user-input').addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
